<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상품 상세페이지 – 안나앤모드</title>
  <link rel="stylesheet" href="css/초기화.css">
  <style>
    /* ── 레이아웃 ── */
    #wrap { width: 1000px; margin: 0 auto; padding: 60px 0 100px; }

    /* ── 뒤로가기 ── */
    .back_btn {
      display: inline-block;
      margin-bottom: 30px;
      font-size: 14px;
      color: #555;
      cursor: pointer;
    }
    .back_btn:hover { color: #111; text-decoration: underline; }

    /* ── 상세 본문 ── */
    .detail_wrap { display: flex; gap: 60px; align-items: flex-start; }

    .detail_img { flex: 0 0 420px; }
    .detail_img img { width: 100%; display: block; }

    .detail_info { flex: 1; }

    /* ── 상품명 / 가격 ── */
    .d_name  { font-size: 22px; font-weight: 600; color: #111; line-height: 1.4; margin-bottom: 12px; }
    .d_price { font-size: 26px; font-weight: 700; color: #111; margin-bottom: 20px; }
    .d_price em { font-size: 14px; font-weight: 400; color: #888; margin-left: 6px; }

    /* ── 구분선 ── */
    .divider { border: none; border-top: 1px solid #e0e0e0; margin: 18px 0; }

    /* ── 설명 ── */
    .d_desc { font-size: 14px; color: #555; line-height: 1.8; margin-bottom: 24px; }

    /* ── 재고 ── */
    .d_stock { font-size: 13px; color: #e04040; margin-bottom: 20px; }
    .d_stock span { font-weight: 600; }

    /* ── 색상 선택 ── */
    .d_row { display: flex; align-items: center; margin-bottom: 16px; gap: 12px; }
    .d_row label { font-size: 13px; color: #555; width: 70px; flex-shrink: 0; }
    .d_row select {
      border: 1px solid #ccc;
      padding: 8px 12px;
      font-size: 13px;
      color: #333;
      background: #fff;
      min-width: 180px;
    }

    /* ── 수량 ── */
    .qty_wrap { display: flex; align-items: center; gap: 0; }
    .qty_btn {
      width: 36px;
      height: 36px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .qty_btn:hover { background: #f0f0f0; }
    .qty_input {
      width: 50px;
      height: 36px;
      text-align: center;
      border: 1px solid #ccc;
      border-left: none;
      border-right: none;
      font-size: 14px;
      color: #333;
    }

    /* ── 쿠폰 ── */
    .coupon_wrap {
      background: #f9f5ff;
      border: 1px dashed #c9a8f5;
      padding: 14px 18px;
      margin: 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .coupon_wrap p { font-size: 13px; color: #555; }
    .coupon_wrap p strong { color: #8b4fd8; }
    .btn_coupon {
      padding: 8px 20px;
      border: 1px solid #8b4fd8;
      background: #fff;
      color: #8b4fd8;
      font-size: 13px;
      cursor: pointer;
    }
    .btn_coupon:hover { background: #8b4fd8; color: #fff; }

    /* ── CTA 버튼 ── */
    .btn_wrap { display: flex; gap: 12px; margin-top: 24px; }
    .btn_cart, .btn_buy {
      flex: 1;
      height: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      letter-spacing: 1px;
    }
    .btn_cart {
      background: #fff;
      border: 2px solid #111;
      color: #111;
    }
    .btn_cart:hover { background: #111; color: #fff; }
    .btn_buy  { background: #111; color: #fff; }
    .btn_buy:hover  { background: #333; }

    /* ── 토스트 알림 ── */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 12px 28px;
      font-size: 14px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 9999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div id="wrap">
    <a class="back_btn" onclick="history.back()">← 목록으로 돌아가기</a>

    <div class="detail_wrap">
      <div class="detail_img">
        <img id="d_img" src="" alt="상품 이미지">
      </div>

      <div class="detail_info">
        <p class="d_name"  id="d_name">-</p>
        <p class="d_price" id="d_price">-<em>원</em></p>
        <hr class="divider">
        <p class="d_desc"  id="d_desc">-</p>
        <p class="d_stock">재고 : <span id="d_stock">-</span>개 남음</p>
        <hr class="divider">

        <!-- 색상 선택 -->
        <div class="d_row">
          <label>색상 선택</label>
          <select id="d_color"></select>
        </div>

        <!-- 수량 -->
        <div class="d_row">
          <label>수량</label>
          <div class="qty_wrap">
            <button class="qty_btn" id="btn_minus">−</button>
            <input  class="qty_input" id="qty_input" type="number" value="1" min="1">
            <button class="qty_btn" id="btn_plus">+</button>
          </div>
        </div>

        <!-- 쿠폰 -->
        <div class="coupon_wrap">
          <p>지금 다운로드하면 <strong>5% 즉시할인 쿠폰</strong>을 드려요!</p>
          <button class="btn_coupon" id="btn_coupon">쿠폰 받기</button>
        </div>

        <!-- CTA -->
        <div class="btn_wrap">
          <button class="btn_cart" id="btn_cart">장바구니 담기</button>
          <button class="btn_buy"  id="btn_buy" >바로 결제</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

        },

          desc: '부드러운 코튼 소재의 셔링 디테일 미니 원피스입니다. 귀엽고 발랄한 스타일링에 잘 어울리며, 스니커즈부터 힐까지 다양한 신발과 매치됩니다.',

        }

    /* ── URL 파라미터 파싱 ── */
    function getParam(key) {
      return new URLSearchParams(location.search).get(key);
    }

    var type = getParam('type') || 'new';
    var idx  = parseInt(getParam('idx') || '0', 10);
    var p    = (PRODUCTS[type] && PRODUCTS[type][idx]) ? PRODUCTS[type][idx] : null;

    if (p) {
      document.getElementById('d_img').src       = p.img;
      document.getElementById('d_img').alt       = p.name;
      document.getElementById('d_name').textContent  = p.name;
      document.getElementById('d_price').innerHTML   = p.price + '<em>원</em>';
      document.getElementById('d_desc').textContent  = p.desc;
      document.getElementById('d_stock').textContent = p.stock;
      document.title = p.name + ' – 안나앤모드';

      var colorSel = document.getElementById('d_color');
      p.colors.forEach(function (c) {
        var opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        colorSel.appendChild(opt);
      });
    }

    /* ── 수량 +/- ── */
    var qtyInput = document.getElementById('qty_input');
    document.getElementById('btn_minus').addEventListener('click', function () {
      if (parseInt(qtyInput.value) > 1) qtyInput.value = parseInt(qtyInput.value) - 1;
    });
    document.getElementById('btn_plus').addEventListener('click', function () {
      if (p && parseInt(qtyInput.value) < p.stock) {
        qtyInput.value = parseInt(qtyInput.value) + 1;
      }
    });

    /* ── 토스트 ── */
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function () { t.classList.remove('show'); }, 2200);
    }

    /* ── 쿠폰 다운로드 ── */
    document.getElementById('btn_coupon').addEventListener('click', function () {
      this.textContent = '다운 완료 ✓';
      this.disabled = true;
      showToast('5% 할인 쿠폰이 다운로드되었습니다.');
    });

    /* ── 장바구니 담기 ── */
    document.getElementById('btn_cart').addEventListener('click', function () {
      var qty = parseInt(qtyInput.value);
      showToast((p ? p.name : '') + ' ' + qty + '개를 장바구니에 담았습니다.');
    });

    /* ── 바로 결제 ── */
    document.getElementById('btn_buy').addEventListener('click', function () {
      showToast('결제 페이지로 이동합니다.');
    });
  </script>
</body>
</html>
