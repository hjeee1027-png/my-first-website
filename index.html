<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f4f8;
    }
    .card {
      text-align: center;
      background: white;
      padding: 48px 64px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 { color: #2d3748; margin-bottom: 12px; }
    p  { color: #718096; }
  </style>
</head>
<body>
  <div class="card">
    <h1>안녕하세요!</h1>
    <p>나의 첫 번째 웹사이트입니다.</p>
  </div>
</body>
</html>
