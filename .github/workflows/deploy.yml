name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build lesson-content1
        working-directory: lecture1/lesson-content1
        run: npm install && npm run build

      - name: Install & Build lesson-footer
        working-directory: lecture1/lesson-footer
        run: npm install && npm run build

      - name: Install & Build lesson-banner
        working-directory: lecture1/lesson-banner
        run: npm install && npm run build

      - name: Install & Build lesson-content2
        working-directory: lecture1/lesson-content2
        run: npm install && npm run build

      - name: Install & Build lesson-content3
        working-directory: lecture1/lesson-content3
        run: npm install && npm run build

      - name: Install & Build lesson-header
        working-directory: lecture1/lesson-header
        run: npm install && npm run build

      - name: Install & Build lesson-final
        working-directory: lecture1/lesson-final
        run: npm install && npm run build

      - name: Install & Build car-site
        working-directory: lecture1/car-site
        run: npm install && npm run build

      - name: Install & Build my-community
        working-directory: lecture1/my-community
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: rm -rf node_modules && npm install && npm run build

      - name: Install & Build mini_sns
        working-directory: lecture1/mini_sns
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: rm -rf node_modules && npm install && npm run build

      - name: Install & Build suv_car_site
        working-directory: lecture1/suv_car_site
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUV_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUV_SUPABASE_ANON_KEY }}
        run: npm install && npm run build

      - name: Combine dist folders
        run: |
          mkdir -p combined/lesson-footer
          mkdir -p combined/lesson-banner
          mkdir -p combined/lesson-content2
          mkdir -p combined/lesson-content3
          mkdir -p combined/lesson-header
          mkdir -p combined/lesson-final
          mkdir -p combined/car-site
          mkdir -p combined/안나앤모드
          mkdir -p combined/my-community
          mkdir -p combined/mini_sns
          mkdir -p combined/suv_car_site
          cp -r lecture1/lesson-content1/dist/. combined/
          cp -r lecture1/lesson-footer/dist/. combined/lesson-footer/
          cp -r lecture1/lesson-banner/dist/. combined/lesson-banner/
          cp -r lecture1/lesson-content2/dist/. combined/lesson-content2/
          cp -r lecture1/lesson-content3/dist/. combined/lesson-content3/
          cp -r lecture1/lesson-header/dist/. combined/lesson-header/
          cp -r lecture1/lesson-final/dist/. combined/lesson-final/
          cp -r lecture1/car-site/dist/. combined/car-site/
          cp -r 안나앤모드/. combined/안나앤모드/
          cp -r lecture1/my-community/dist/. combined/my-community/
          cp -r lecture1/mini_sns/dist/. combined/mini_sns/
          cp -r lecture1/suv_car_site/dist/. combined/suv_car_site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
