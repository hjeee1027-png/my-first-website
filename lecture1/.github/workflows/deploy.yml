name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ui_test 빌드
      - name: Install ui_test dependencies
        working-directory: ui_test
        run: npm install

      - name: Build ui_test
        working-directory: ui_test
        run: npm run build

      # my-community 빌드
      - name: Install my-community dependencies
        working-directory: my-community
        run: npm install

      - name: Build my-community
        working-directory: my-community
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # 결과물 합치기
      - name: Combine build outputs
        run: |
          set -e
          mkdir -p combined_dist/ui_test
          mkdir -p combined_dist/my-community
          cp -rv ui_test/dist/. combined_dist/ui_test/
          cp -rv my-community/dist/. combined_dist/my-community/
          cp root-index.html combined_dist/index.html
          echo "=== combined_dist 구조 ==="
          ls -la combined_dist/
          ls -la combined_dist/my-community/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined_dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
