name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ui_test 빌드
      - name: Install ui_test dependencies
        working-directory: ui_test
        run: npm install

      - name: Build ui_test
        working-directory: ui_test
        run: npm run build

      # my-community 빌드
      - name: Install my-community dependencies
        working-directory: my-community
        run: npm install

      - name: Build my-community
        working-directory: my-community
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # 결과물 합치기
      - name: Combine build outputs
        run: |
          mkdir -p combined_dist/ui_test
          mkdir -p combined_dist/my-community
          cp -r ui_test/dist/. combined_dist/ui_test/
          cp -r my-community/dist/. combined_dist/my-community/
          cat > combined_dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ko">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>My Projects</title>
            <style>
              body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #FFFBF0; margin: 0; }
              h1 { color: #5C3D00; margin-bottom: 2rem; }
              .links { display: flex; gap: 1rem; }
              a { padding: 1rem 2rem; background: linear-gradient(135deg, #FFD93D, #6BCB77); color: #5C3D00; border-radius: 16px; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
              a:hover { opacity: 0.85; }
            </style>
          </head>
          <body>
            <h1>🐾 My Projects</h1>
            <div class="links">
              <a href="./ui_test/">UI Test</a>
              <a href="./my-community/">마이냥멍</a>
            </div>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined_dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
